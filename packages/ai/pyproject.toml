[project]
name = "equitie-ai"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "equitie-common",
    "anthropic>=0.30",
    "langchain>=0.2",
    "langchain-anthropic>=0.1",
    "langgraph>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai"]

[tool.uv.sources]
equitie-common = { workspace = true }
