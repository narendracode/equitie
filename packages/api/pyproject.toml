[project]
name = "equitie-api"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "equitie-common",
    "equitie-ai",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "celery[redis]>=5.3",
    "redis>=5.0",
    "httpx>=0.27",
    "python-multipart>=0.0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]

[tool.uv.sources]
equitie-common = { workspace = true }
equitie-ai = { workspace = true }
